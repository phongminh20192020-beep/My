server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    # YouTube plugin - required for YouTube playback
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false
    # LavaSrc plugin - for Spotify/Apple Music support
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.2.0"
      repository: "https://maven.topi.wtf/releases"
      snapshot: false

  server:
    password: "youshallnotpass"
    sources:
      youtube: false          # Handled by youtube-plugin
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    playerUpdateInterval: 5
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

    # Client priority - MUSIC uses OAuth auth, least likely to be bot-checked
    clients:
      - MUSIC
      - ANDROID_VR
      - TVHTML5_SIMPLY
      - MWEB
      - WEBEMBEDDED
      - WEB

    # ============================================================================
    # OAUTH CONFIGURATION (Recommended - fixes "Sign in to confirm you're not a bot")
    # ============================================================================
    # This is the MOST RELIABLE way to avoid bot checks on YouTube.
    #
    # FIRST-TIME SETUP (one time only):
    #   1. Make sure enabled is true and refreshToken is commented out (below).
    #   2. Deploy your bot.
    #   3. Watch the Lavalink logs - they will print a URL like:
    #      https://www.google.com/device?user_code=XXXX-XXXX
    #   4. Open that URL in your browser, enter the code shown.
    #   5. Sign in with a BURNER Google account (NOT your main account!).
    #   6. Approve the access when prompted.
    #   7. Lavalink logs will print a refreshToken - copy it.
    #   8. Paste the refreshToken below, uncomment it, and set skipInitialization: true.
    #   9. Redeploy - OAuth will work permanently from now on.
    #
    # AFTER SETUP (permanent):
    #   - Keep refreshToken filled in and skipInitialization: true
    #   - The token lasts indefinitely (unless you revoke it from Google Account settings)
    # ============================================================================
    oauth:
      enabled: true
      # --- STEP 1: Leave these commented on first deploy ---
      # refreshToken: "PASTE_YOUR_REFRESH_TOKEN_HERE_AFTER_SETUP"
      # skipInitialization: true
      # --- STEP 2: After getting token from logs, uncomment above and redeploy ---

    # ============================================================================
    # POT (Proof of Origin Token) - Secondary bot protection bypass
    # ============================================================================
    # OAuth above is the PRIMARY method. POT provides additional protection.
    # The youtube-plugin reads VISITOR_DATA from your cookies.txt to generate POT.
    #
    # Requirements:
    #   - Your cookies.txt MUST contain a VISITOR_DATA cookie
    #   - If VISITOR_DATA is missing from your cookies export, try:
    #     * Clear YouTube cookies and sign in again
    #     * Use a different browser (Firefox works better)
    #     * Use a private/incognito window
    #
    # Alternative: Use direct tokens (uncomment visitorData + poToken below)
    #   Get them from browser DevTools -> Network -> /player request payload
    # ============================================================================
    pot:
      # Option A: Direct tokens (get from browser DevTools)
      # visitorData: "PASTE_VISITOR_DATA_HERE"
      # poToken: "PASTE_PO_TOKEN_HERE"

      # Option B: Read from cookie file (default - requires VISITOR_DATA cookie!)
      cookiePath: "/opt/Lavalink/cookies.txt"

  # LavaSrc plugin configuration (Spotify support)
  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"
      - "scsearch:%QUERY%"
    sources:
      spotify: true
      applemusic: false
      deezer: false
      yandexmusic: false
      flowerytts: false
      youtube: true
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET}"
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6
      resolveArtistsInSearch: true
      localFiles: false

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

sentry:
  dsn: ""
  environment: ""

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
  request:
    enabled: true
    includeClientInfo: true
    includeHeaders: false
    includeQueryString: true
    includePayload: true
    maxPayloadLength: 10000
  logback:
    rollingpolicy:
      max-file-size: 1GB
      max-history: 30
