# Railway deployment notes:
# - This file's values are local-dev defaults. On Railway, override the
#   sensitive/environment-specific ones via service Variables instead of
#   editing this file -- Lavalink (Spring Boot) reads matching environment
#   variables and they take precedence over what's written here:
#     SERVER_PORT                -> server.port
#     LAVALINK_SERVER_PASSWORD   -> lavalink.server.password
# - See ../RAILWAY.md for the full setup walkthrough.
server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.2.0"
      repository: "https://maven.topi.wtf/releases"
      snapshot: false
  server:
    password: "youshallnotpass"
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    playerUpdateInterval: 5
    gc-warnings: true

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true
    # NOTE: ANDROID_TESTSUITE and TVHTML5EMBEDDED were removed/renamed upstream and
    # silently failed to load on this plugin version, causing extra track failures.
    clients:
      - MUSIC
      - WEB
      - MWEB
      - WEBEMBEDDED
      - ANDROID_VR
      - TVHTML5_SIMPLY
    # This is the "login with cookies" equivalent for this plugin: instead of raw
    # browser cookies, youtube-source uses YouTube's official OAuth device flow so
    # requests are attributed to a logged-in account instead of a signed-out client,
    # which avoids most "Sign in to confirm you're not a bot" failures.
    #
    # Setup (do this once, locally or by watching this node's logs after deploy):
    #   1. Set enabled: true (below) and leave refreshToken commented out.
    #   2. Start/redeploy Lavalink and watch the logs. It will print a URL
    #      (https://www.google.com/device) and a short code.
    #   3. On any browser, open that URL and enter the code, then approve with a
    #      YouTube/Google account. STRONGLY prefer a separate "burner" account,
    #      not your main one — Google can flag/restrict accounts used this way.
    #   4. The log will then print a refreshToken. Copy it into refreshToken below,
    #      uncomment it, and set skipInitialization: true so it doesn't redo the
    #      device flow on every restart. Redeploy.
    oauth:
      enabled: true
      # refreshToken: "paste the refresh token printed in the logs here"
      # skipInitialization: true
    # Cookie-based login (alternative / complement to OAuth above).
    # Paste your Netscape cookies into lavalink/cookies.txt and they will be
    # baked into the Docker image and loaded here on startup.
    pot:
      cookiePath: "/opt/Lavalink/cookies.txt"
  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"
      - "scsearch:%QUERY%"
    sources:
      spotify: true
      applemusic: false
      deezer: false
      yandexmusic: false
      flowerytts: false
      youtube: true
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET}"
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6
      resolveArtistsInSearch: true
      localFiles: false

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

sentry:
  dsn: ""
  environment: ""

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
  request:
    enabled: true
    includeClientInfo: true
    includeHeaders: false
    includeQueryString: true
    includePayload: true
    maxPayloadLength: 10000
  logback:
    rollingpolicy:
      max-file-size: 1GB
      max-history: 30
