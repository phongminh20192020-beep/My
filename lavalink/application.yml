server:
  port: 2333
  address: 0.0.0.0

lavalink:
  plugins:
    - dependency: "dev.lavalink.youtube:youtube-plugin:1.18.1"
      repository: "https://maven.lavalink.dev/releases"
      snapshot: false
    - dependency: "com.github.topi314.lavasrc:lavasrc-plugin:4.2.0"
      repository: "https://maven.topi.wtf/releases"
      snapshot: false

  server:
    password: "youshallnotpass"
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      http: true
      local: false
    filters:
      volume: true
      equalizer: true
      karaoke: true
      timescale: true
      tremolo: true
      vibrato: true
      distortion: true
      rotation: true
      channelMix: true
      lowPass: true
    bufferDurationMs: 400
    frameBufferDurationMs: 5000
    opusEncodingQuality: 10
    resamplingQuality: LOW
    trackStuckThresholdMs: 10000
    useSeekGhosting: true
    playerUpdateInterval: 5
    #youtubePlaylistLoadLimit: 6 # Number of pages at 100 each
    youtubeSearchEnabled: true
    soundcloudSearchEnabled: true
    gc-warnings: true

plugins:
  youtube:
    enabled: true
    allowSearch: true
    allowDirectVideoIds: true
    allowDirectPlaylistIds: true

    # Client priority order:
    # MUSIC goes first -- it uses cookie/OAuth auth and is least likely to be bot-checked.
    # WEB is last -- most likely to hit "Sign in to confirm you're not a bot" on datacenter IPs.
    clients:
      - MUSIC
      - ANDROID_VR
      - TVHTML5_SIMPLY
      - MWEB
      - WEBEMBEDDED
      - WEB

    # ============================================================================
    # OAUTH CONFIGURATION (Recommended - fixes "Sign in to confirm you're not a bot")
    # ============================================================================
    # OAuth is the MOST RELIABLE way to avoid bot checks.
    #
    # SETUP (one time only):
    #   1. Set enabled: true, leave refreshToken commented out, deploy.
    #   2. Watch Lavalink logs -- it will print a URL + short code.
    #   3. Open that URL in any browser, enter the code, approve with a BURNER Google account.
    #   4. Lavalink logs will print a refreshToken. Copy it below.
    #   5. Uncomment refreshToken + skipInitialization, redeploy.
    #
    # If you have a refreshToken, uncomment and fill it in:
    oauth:
      enabled: true
      # refreshToken: "YOUR_REFRESH_TOKEN_HERE"
      # skipInitialization: true

    # ============================================================================
    # PROOF OF ORIGIN TOKEN (POT) CONFIGURATION
    # ============================================================================
    # POT tokens help bypass bot detection. You can provide them via:
    #   A) visitorData + poToken (most reliable)
    #   B) cookiePath (reads from Netscape cookies.txt)
    #
    # Option A: Direct token (recommended for Railway/cloud deployment)
    #   Get these from your browser's YouTube requests:
    #   1. Open YouTube in browser, open DevTools (F12) -> Network tab
    #   2. Find a /player or /watch request
    #   3. Look for "visitorData" and "poToken" in the request payload
    #   4. Paste them below and comment out cookiePath
    #
    # Option B: Cookie file (used here - reads from /opt/Lavalink/cookies.txt)
    #   Make sure your cookies.txt contains VISITOR_DATA and PO_TOKEN cookies!
    #   These are REQUIRED for the pot feature to work.
    pot:
      # Option A: Uncomment these if you have direct tokens:
      # visitorData: "YOUR_VISITOR_DATA_HERE"
      # poToken: "YOUR_PO_TOKEN_HERE"

      # Option B: Cookie file path (must contain VISITOR_DATA cookie!)
      cookiePath: "/opt/Lavalink/cookies.txt"

  lavasrc:
    providers:
      - "ytsearch:\"%ISRC%\""
      - "ytsearch:%QUERY%"
      - "scsearch:%QUERY%"
    sources:
      spotify: true
      applemusic: false
      deezer: false
      yandexmusic: false
      flowerytts: false
      youtube: true
    spotify:
      clientId: "${SPOTIFY_CLIENT_ID}"
      clientSecret: "${SPOTIFY_CLIENT_SECRET}"
      countryCode: "US"
      playlistLoadLimit: 6
      albumLoadLimit: 6
      resolveArtistsInSearch: true
      localFiles: false

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

sentry:
  dsn: ""
  environment: ""

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
  request:
    enabled: true
    includeClientInfo: true
    includeHeaders: false
    includeQueryString: true
    includePayload: true
    maxPayloadLength: 10000
  logback:
    rollingpolicy:
      max-file-size: 1GB
      max-history: 30
